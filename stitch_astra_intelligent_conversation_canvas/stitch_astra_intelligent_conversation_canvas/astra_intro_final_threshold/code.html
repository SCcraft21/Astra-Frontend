<style>
    body {
      background: radial-gradient(circle at 50% 50%, #171f33 0%, #0b1326 100%);
      overflow: hidden;
    }

    .glass-effect {
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ambient-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(128, 131, 255, 0.15) 0%, rgba(128, 131, 255, 0) 70%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 1;
    }

    .pulse-orb {
      position: relative;
      z-index: 10;
    }

    @keyframes soft-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 20px rgba(128, 131, 255, 0.2)); }
      50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 40px rgba(128, 131, 255, 0.4)); }
    }

    .animate-astra-pulse {
      animation: soft-pulse 4s ease-in-out infinite;
    }
  </style>

<span class="material-symbols-outlined text-on-tertiary-fixed text-3xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
