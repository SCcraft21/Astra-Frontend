<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ASTRA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#ddb7ff",
                    "on-error-container": "#ffdad6",
                    "surface-container-lowest": "#060e20",
                    "secondary-fixed": "#f0dbff",
                    "surface": "#0b1326",
                    "background": "#0b1326",
                    "inverse-surface": "#dae2fd",
                    "secondary-fixed-dim": "#ddb7ff",
                    "tertiary-fixed": "#ffddb8",
                    "surface-variant": "#2d3449",
                    "primary-fixed": "#e1e0ff",
                    "surface-container-highest": "#2d3449",
                    "on-surface": "#dae2fd",
                    "surface-container-high": "#222a3d",
                    "secondary-container": "#6f00be",
                    "on-tertiary-fixed": "#2a1700",
                    "surface-tint": "#c0c1ff",
                    "on-secondary-fixed": "#2c0051",
                    "on-primary-fixed": "#07006c",
                    "surface-dim": "#0b1326",
                    "surface-bright": "#31394d",
                    "outline-variant": "#464554",
                    "on-surface-variant": "#c7c4d7",
                    "inverse-on-surface": "#283044",
                    "surface-container-low": "#131b2e",
                    "on-secondary-fixed-variant": "#6900b3",
                    "error-container": "#93000a",
                    "tertiary": "#ffb95f",
                    "on-tertiary": "#472a00",
                    "error": "#ffb4ab",
                    "surface-container": "#171f33",
                    "primary-container": "#8083ff",
                    "on-primary": "#1000a9",
                    "inverse-primary": "#494bd6",
                    "primary": "#c0c1ff",
                    "tertiary-container": "#ca8100",
                    "primary-fixed-dim": "#c0c1ff",
                    "outline": "#908fa0",
                    "on-primary-container": "#0d0096",
                    "on-background": "#dae2fd",
                    "on-secondary": "#490080",
                    "on-tertiary-container": "#3e2400",
                    "on-error": "#690005",
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-secondary-container": "#d6a9ff",
                    "on-primary-fixed-variant": "#2f2ebe"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "margin-mobile": "16px",
                    "card-padding": "32px",
                    "margin-desktop": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "user-prompt": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "label-caps": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "display-lg": ["Inter"]
            },
            "fontSize": {
                    "user-prompt": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "500"}],

          },
        },
      }

<style>
        body {
            background: radial-gradient(circle at 50% 50%, #171f33 0%, #0b1326 100%);
            min-height: 100vh;
        }
        .glass-card {
            backdrop-filter: blur(40px);
            background: rgba(23, 31, 51, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(128, 131, 255, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center font-body-md text-on-surface antialiased px-margin-mobile md:px-0">
<!-- Ambient background glows -->
<div class="ambient-glow top-[-100px] left-[-100px]"></div>
<div class="ambient-glow bottom-[-100px] right-[-100px]"></div>
<!-- Login Container -->
<main class="w-full max-w-[480px] relative z-10 py-12">
<!-- Glassmorphic Card -->
<div class="glass-card rounded-[32px] p-card-padding shadow-2xl overflow-hidden relative group">
<!-- Subtle top highlight for glass effect -->
<div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 mb-6 relative">
<!-- Subtle glow behind logo -->
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
<img alt="ASTRA Intelligence Logo" class="w-full h-full object-contain relative z-10" data-alt="A sophisticated abstract logo for an AI assistant named ASTRA. The logo consists of fluid, interlocking geometric forms in gradients of indigo, soft violet, and warm peach. It is set against a dark, minimalist background, evoking a sense of calm intelligence and high-tech elegance. The lighting is soft and directional, creating a gentle 3D effect on the logo's surface." src="https://lh3.googleusercontent.com/aida/ADBb0uijIFwlf161O_u25PuyvfL-TmxSR5yo14FT8Jm8K7bVCJki6VLYB5RI-6zlCJJFWsb-2TORsXeNOmTW-S88KkFYt0w4TNU1_uSx9zHN3sI9yPqtt05JlYu0R6nkJ2bur374N2NIm4y1TFLualL9AzN4qG29K8tHBG7CrAGIAvL6ggdFCo_SfB93YE3P00qjdXXCdCXxVR32T8TAW3F22xNFmZn3h07AwBvAGqEGmP2JJVodjc1zMi3unGQ"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tighter">ASTRA</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Welcome back to the core</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-low/50 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition-all text-body-md font-body-md placeholder-on-surface-variant/40" id="email" placeholder="name@domain.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-40">mail</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low/50 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition-all text-body-md font-body-md placeholder-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-40">lock</span>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-tertiary-container hover:bg-tertiary transition-all duration-300 py-4 rounded-2xl font-user-prompt text-user-prompt text-on-tertiary-container shadow-[0_0_20px_rgba(202,129,0,0.2)] hover:shadow-[0_0_30px_rgba(202,129,0,0.4)] active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-white/5"></div>
<span class="px-4 font-label-caps text-label-caps text-on-surface-variant/60">Or continue with</span>
<div class="flex-grow h-px bg-white/5"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 bg-surface-container/60 hover:bg-surface-container-highest/60 border border-white/10 py-3 rounded-xl transition-all font-body-md text-body-md text-on-surface">
<span class="material-symbols-outlined text-[20px]">public</span>
                    Google
                </button>
<button class="flex items-center justify-center gap-3 bg-surface-container/60 hover:bg-surface-container-highest/60 border border-white/10 py-3 rounded-xl transition-all font-body-md text-body-md text-on-surface">
<span class="material-symbols-outlined text-[20px]">code</span>
                    GitHub
                </button>
</div>
<!-- Registration Link -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    New to the intelligence? 
                    <a class="text-primary hover:text-primary-container font-medium ml-1 transition-colors" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Footer Decoration -->
<div class="mt-12 flex justify-center items-center gap-6 opacity-30 grayscale contrast-125">
<div class="h-px w-8 bg-on-surface"></div>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="h-px w-8 bg-on-surface"></div>
</div>
</main>
<!-- Aesthetic Layered Lists Background Decoration (Hidden on Mobile) -->
<div class="hidden lg:block fixed -right-24 top-1/4 w-96 space-y-8 opacity-20 pointer-events-none">
<div class="h-px w-full bg-gradient-to-r from-transparent via-primary/50 to-transparent blur-sm"></div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-secondary/30 to-transparent blur-sm"></div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-tertiary/20 to-transparent blur-sm"></div>
</div>
<div class="hidden lg:block fixed -left-24 bottom-1/4 w-96 space-y-8 opacity-20 pointer-events-none transform rotate-12">
<div class="h-px w-full bg-gradient-to-r from-transparent via-primary/50 to-transparent blur-sm"></div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-secondary/30 to-transparent blur-sm"></div>
</div>
</body></html>
